<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="profile-page">

    <header class="navbar">
        <div class="container">
            <div class="logo">Thinkara</div>
            <nav>
                <a href="index.html">Beranda</a>
                <a href="about.html">About</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="contact.html">Profil</a>
                <a href="contact.html" class="btn-nav">Kontak</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="profile-wrapper">
                <div class="card">

                    <h2 class="profile-title">User Profile</h2>

                    <div class="profile-current-data">

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" value="guest123" disabled>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" value="guest12@gmail.com" disabled>
                    </div>

                </div>

                <hr style="margin: 2rem 0; border: none; border-top: 1px solid #e2e8f0;">

                <!-- Update -->

                <div class="form-group">
                    <label for="username">Ganti Username</label>
                    <input type="text" id="username" placeholder="Masukkan username baru">
                </div>

                <div class="form-group">
                    <label for="biodata">Ganti Email</label>
                    <input type="text" id="biodata" placeholder="Masukkan email baru">
                </div>

                <div class="form-group">
                    <label for="password">Ganti Password</label>
                    <input type="password" id="password" placeholder="Masukkan password baru">
                </div>

                <div class="profile-actions">
                    <button class="btn-submit">Update Profile</button>
                    <button class="btn-danger">Logout</button>
                </div>

                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 <strong>Thinkara.</strong></p>
        </div>
    </footer>

</body>
</html>
