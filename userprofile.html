<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="profile-page">

 <header class="navbar">
        <div class="container">
            <div class="logo">Thinkara</div>
            <nav>
                <a href="index.html">Beranda</a>
                <a href="about.html">About</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="contact.html" >Kontak</a>
                <a href="userprofile.html">Profil</a>
            </nav>
        </div>
    </header>

    <!-- not logged in -->
    <div id="not-logged" style="display:none; text-align:center;">
        <div class="container">
            <div class="profile-wrapper">
                <div class="card">
                    <h2 class="profile-title">
                        Silahkan daftar terlebih dahulu
                        <a href="index.html#login-form">
                            Daftar
                        </a>
                    </h2>
                </div>
            </div>
        </div>
    </div>

    <!-- logged in -->
    <main>
        <div class="container" id="profile-section">
            <div class="profile-wrapper">
                <div class="card">

                    <h2 class="profile-title">User Profile</h2>

                    <div class="profile-current-data">

                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="current-username"disabled>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="text" id="current-email" disabled>
                        </div>

                    </div>

                    <hr style="margin: 2rem 0; border: none; border-top: 1px solid #e2e8f0;">

                    <!-- Update -->

                    <form onsubmit="event.preventDefault()">

                        <div class="form-group">
                            <label for="username">Ganti Username</label>
                            <input type="text" id="username" placeholder="Masukkan username baru">
                            <small id="username-error-msg" style="color:red"></small>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Ganti Email</label>
                            <input type="email" id="email" placeholder="Masukkan email baru">
                            <small id="email-error-msg" style="color:red"></small>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Ganti Password</label>
                            <input type="password" id="password" placeholder="Masukkan password baru">
                            <small id="password-error-msg" style="color:red"></small>
                        </div>
                        
                        <div class="profile-actions">
                            <button class="btn-submit" onclick="editData()">Update Profile</button>
                            <button class="btn-danger" onclick="deleteData()">Logout</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 <strong>Thinkara.</strong></p>
        </div>
    </footer>
